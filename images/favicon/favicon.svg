<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Terminal CS Apple dark">
  <defs>
    <linearGradient id="adBg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#1A1C24"/>
      <stop offset="0.5" stop-color="#141620"/>
      <stop offset="1" stop-color="#0E0F16"/>
    </linearGradient>
    <linearGradient id="adBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="adBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A84FF"/>
      <stop offset="1" stop-color="#5E5CE6"/>
    </linearGradient>
    <linearGradient id="adSilverBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D1D5E0"/>
      <stop offset="0.4" stop-color="#B8C4E0"/>
      <stop offset="1" stop-color="#98AEDB"/>
    </linearGradient>
    <filter id="adGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="blueHalo" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="adClip"><rect width="64" height="64" rx="14"/></clipPath>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#adBg)"/>

  <!-- blue ambient -->
  <circle cx="12" cy="50" r="22" fill="#0A84FF" fill-opacity="0.06"/>
  <circle cx="52" cy="12" r="20" fill="#5E5CE6" fill-opacity="0.05"/>
  <circle cx="32" cy="32" r="28" fill="#0A84FF" fill-opacity="0.025"/>

  <!-- glass card -->
  <rect x="5" y="5" width="54" height="54" rx="11" fill="#FFFFFF" fill-opacity="0.035"
        stroke="#0A84FF" stroke-opacity="0.08" stroke-width="0.7"/>

  <!-- title bar -->
  <rect x="5" y="5" width="54" height="11.5" rx="11" fill="url(#adBar)"/>
  <rect x="5" y="12" width="54" height="4.5" fill="url(#adBar)"/>
  <line x1="5" y1="16.5" x2="59" y2="16.5" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="0.5"/>
  <circle cx="14" cy="10.5" r="2" fill="#FF5F57" fill-opacity="0.85"/>
  <circle cx="21" cy="10.5" r="2" fill="#FEBC2E" fill-opacity="0.85"/>
  <circle cx="28" cy="10.5" r="2" fill="#28C840" fill-opacity="0.85"/>

  <!-- lock pill -->
  <rect x="45" y="7.5" width="11" height="6" rx="3" fill="#0A84FF" fill-opacity="0.12"
        stroke="#0A84FF" stroke-opacity="0.25" stroke-width="0.5"/>
  <path d="M49.2 9.5 V8.6 a1.3 1.3 0 0 1 2.6 0 V9.5" fill="none" stroke="#0A84FF"
        stroke-width="0.85" stroke-linecap="round"/>
  <rect x="48.6" y="9.3" width="3.8" height="2.6" rx="0.7" fill="#0A84FF" fill-opacity="0.6"/>

  <!-- prompt chevron -->
  <g filter="url(#adGlow)">
    <path d="M10 32.5 l4.5 3.5 -4.5 3.5" fill="none" stroke="#0A84FF" stroke-width="2.6"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- CS monogram — silver-blue with halo -->
  <g filter="url(#blueHalo)">
    <!-- C -->
    <path d="M29 27.5 H23 Q19.5 27.5 19.5 31.5 V35.5 Q19.5 39.5 23 39.5 H29"
          fill="none" stroke="url(#adSilverBlue)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- S -->
    <path d="M46 27.5 H39 Q35.5 27.5 35.5 31 Q35.5 33.5 39 33.5 H43 Q46.5 33.5 46.5 36 Q46.5 39.5 43 39.5 H36"
          fill="none" stroke="url(#adSilverBlue)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- blue accent bar -->
  <line x1="19.5" y1="42.5" x2="46.5" y2="42.5" stroke="url(#adBlue)" stroke-width="1.6"
        stroke-linecap="round" filter="url(#blueHalo)" opacity="0.8"/>

  <!-- cursor -->
  <rect x="50" y="35.5" width="4" height="4.5" rx="1" fill="#0A84FF" fill-opacity="0.8"/>
</svg>
